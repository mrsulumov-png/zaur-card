<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Анита — Dune Estate</title>

<style>
:root{
  --brand:#47060C;
  --brand-light:#6A1A22;
  --accent:#D5BEB2;
  --bg:#f5f3f2;
  --card:#fff;
  --text:#222;
  --muted:#7a7a7a;
  --radius:16px;
  --shadow:0 15px 35px rgba(0,0,0,.12);
  --max:560px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.shell{max-width:var(--max);margin:0 auto}

/* HERO */
.hero{
  background:var(--brand);
  color:#fff;
  padding:30px 20px 20px;
  text-align:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(255,255,255,.3);
}

h1{
  margin:18px 0 6px;
  font-size:26px;
  font-weight:800;
}

.subtitle{
  font-size:14px;
  opacity:.95;
  line-height:1.6;
}

/* ACTION BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.actions a{
  flex:1;
  padding:14px 6px;
  text-decoration:none;
  color:#fff;
  font-weight:800;
  border-radius:12px;
  background:rgba(255,255,255,.12);
  font-size:13px;
}

/* CARD */
.card{
  background:#fff;
  margin:16px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.row{
  padding:16px;
  border-top:1px solid #eee;
}

.row:first-child{border-top:none}

.value{
  font-size:16px;
  font-weight:700;
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.link{
  color:#222;
  text-decoration:none;
  font-weight:800;
}

/* PROJECT DROPDOWN */
.dropdown{
  cursor:pointer;
}

.dropdownContent{
  display:none;
  padding-top:10px;
}

.dropdownContent a{
  display:block;
  padding:10px 0;
  text-decoration:none;
  color:#47060C;
  font-weight:700;
}

/* BUTTONS */
.btnRow{
  display:flex;
  gap:12px;
  padding:16px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  text-decoration:none;
  color:#fff;
  font-weight:900;
  text-align:center;
}

.btn.wa{background:#25D366}
.btn.tg{background:#229ED9}

.btnSave{
  display:block;
  margin:0 16px 16px;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:900;
  text-decoration:none;
  color:#222;
  background:#fff;
  border:1px solid #eee;
}
</style>
</head>

<body>

<div class="shell">

  <div class="hero">

    <img src="anita.jpg" class="avatar">

    <h1>Анита</h1>

    <div class="subtitle">
      Основатель и руководитель Dune Estate<br>
      Недвижимость • ЧР • Дубай
    </div>

    <div class="actions">
      <a href="tel:+79991234567">ПОЗВОНИТЬ</a>
      <a href="mailto:info@dunestate.com">EMAIL</a>
      <a href="#">КАТАЛОГ</a>
    </div>

  </div>

  <div class="card">

    <div class="row">
      <div class="value">
        <a class="link" href="tel:+79991234567">+7 999 123-45-67</a>
      </div>
      <div class="label">Телефон</div>
    </div>

    <div class="row">
      <div class="value">
        <a class="link" href="mailto:info@dunestate.com">info@dunestate.com</a>
      </div>
      <div class="label">Email</div>
    </div>

    <div class="row">
      <div class="value">
        <a class="link" href="https://dunestate.com" target="_blank">dunestate.com</a>
      </div>
      <div class="label">Сайт</div>
    </div>

    <!-- DROPDOWN -->
    <div class="row dropdown" onclick="toggleProjects()">
      <div class="value">Другие проекты ▼</div>

      <div id="projects" class="dropdownContent">
        <a href="https://www.instagram.com/kuhni_marya_grozny95?igsh=MTI4NjNicmUzOXA5ZA==" target="_blank">
          Кухни и шкафы Мария
        </a>

        <a href="https://www.instagram.com/kuhni_marya_grozny95?igsh=MTI4NjNicmUzOXA5ZA==" target="_blank">
          Премиальная мебель Калинка
        </a>
      </div>
    </div>

    <div class="btnRow">
      <a class="btn wa">WHATSAPP</a>
      <a class="btn tg">TELEGRAM</a>
    </div>

    <a class="btnSave">СОХРАНИТЬ КОНТАКТ</a>

  </div>

</div>

<script>
function toggleProjects(){
  const el = document.getElementById('projects');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
